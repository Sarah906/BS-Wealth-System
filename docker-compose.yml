version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: wealthos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wealthos}
      POSTGRES_USER: ${POSTGRES_USER:-wealthos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthos_secret}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wealthos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealthos_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wealthos}:${POSTGRES_PASSWORD:-wealthos_secret}@db:5432/${POSTGRES_DB:-wealthos}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production_32chars_min}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wealthos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  uploads_data:
